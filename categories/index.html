---
layout: default
title: Kategori
permalink: /categories/
---

<div class="my-5">

  <h6 class="fw-bold text-uppercase mb-3">
    <span class="text-danger">/</span>
    <span id="category-title">KATEGORI</span>
    <span class="text-danger">/</span>
  </h6>

  <div class="row g-4" id="post-list"></div>

  <!-- PAGINATION -->
  <div class="d-flex justify-content-center mt-4 gap-2" id="pagination"></div>

</div>

<script>
const hash = window.location.hash.replace("#", "").toLowerCase();

const perPage = 6;
let currentPage = 1;

const allPosts = [
  {% for post in site.posts %}
  {
    title: `{{ post.title | escape }}`,
    url: "{{ post.url | relative_url }}",
    image: "{{ post.image | relative_url }}",
    date: "{{ post.date | date: "%b %-d, %Y" }}",
    excerpt: `{{ post.excerpt | strip_html | truncate: 100 | escape }}`,
    categories: [
      {% for cat in post.categories %}
        "{{ cat | slugify }}"{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ],
    category_name: "{{ post.categories[0] }}"
  },
  {% endfor %}
];

let filtered = hash
  ? allPosts.filter(p => p.categories.includes(hash))
  : allPosts;

document.getElementById("category-title").innerText =
  hash ? hash.toUpperCase() : "SEMUA KATEGORI";

const container = document.getElementById("post-list");
const pagination = document.getElementById("pagination");

function renderPage(page) {
  container.innerHTML = "";

  let start = (page - 1) * perPage;
  let end = start + perPage;

  let pageItems = filtered.slice(start, end);

  if (pageItems.length === 0) {
    container.innerHTML = `
      <div class="col-12 text-center text-muted py-5">
        Tidak ada postingan.
      </div>
    `;
    pagination.innerHTML = "";
    return;
  }

  pageItems.forEach(p => {
    container.innerHTML += `
      <div class="col-12 col-md-4">
        <div class="card border-0 h-100">

          <a href="${p.url}" class="text-decoration-none text-dark">

            <div class="position-relative">
              <img src="${p.image ? p.image : '/images/default.jpg'}"
                   class="w-100 rounded"
                   style="aspect-ratio:16/9; object-fit:cover;" loading="lazy">
            </div>

            <div class="mt-3">

              <div class="small text-danger fw-semibold mb-1">
                ${p.category_name}
              </div>

              <h4 class="fw-bold text-dark mb-1">
                ${p.title}
              </h4>

              <small class="text-muted d-block mb-1">
                ${p.date}
              </small>

              <p class="text-muted small mb-0">
                ${p.excerpt}
              </p>

            </div>

          </a>

        </div>
      </div>
    `;
  });

  renderPagination(page);
}

function renderPagination(page) {
  pagination.innerHTML = "";

  let totalPages = Math.ceil(filtered.length / perPage);

  if (totalPages <= 1) return;

  // Prev
  pagination.innerHTML += `
    <button class="btn btn-sm btn-outline-dark"
      ${page === 1 ? "disabled" : ""}
      onclick="goPage(${page - 1})">
      Prev
    </button>
  `;

  // Info
  pagination.innerHTML += `
    <span class="align-self-center small px-2">
      ${page} / ${totalPages}
    </span>
  `;

  // Next
  pagination.innerHTML += `
    <button class="btn btn-sm btn-outline-dark"
      ${page === totalPages ? "disabled" : ""}
      onclick="goPage(${page + 1})">
      Next
    </button>
  `;
}

window.goPage = function(page) {
  currentPage = page;
  renderPage(currentPage);
  window.scrollTo({ top: 0, behavior: "smooth" });
};

// init
renderPage(currentPage);
</script>

<script>
window.addEventListener("hashchange", () => location.reload());
</script>

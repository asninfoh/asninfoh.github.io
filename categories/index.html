---
layout: default
title: Categories
permalink: /categories/
---

<div class="container">

  <h2 class="fw-bold mb-3">Kategori Artikel</h2>

  <!-- SEARCH KATEGORI -->
  <input id="catSearch"
         class="form-control mb-3"
         placeholder="Cari kategori (contoh: gaji, pns, inspirasi...)">

  <!-- BUTTON KATEGORI -->
  <div class="d-flex flex-wrap gap-2 mb-3">

    {% for category in site.categories %}
      <button class="btn btn-sm btn-outline-primary"
              onclick="location.hash='{{ category[0] | slugify }}'; showCat('{{ category[0] | slugify }}')">
        {{ category[0] }}
      </button>
    {% endfor %}

  </div>

  <hr>

  <!-- OUTPUT POST -->
  <div id="postList">
    <p class="text-muted">Pilih kategori atau buka link dari sidebar</p>
  </div>

</div>

<!-- DATA KATEGORI -->
<script>
const CAT_DATA = {
  {% for category in site.categories %}
  "{{ category[0] | slugify }}": [
    {% for post in category[1] %}
    {
      title: "{{ post.title | escape }}",
      url: "{{ post.url | relative_url }}",
      image: "{{ post.image | relative_url }}"
    },
    {% endfor %}
  ],
  {% endfor %}
};

// TAMPILKAN POST (SEPERTI INDEX)
function showCat(cat) {
  const posts = CAT_DATA[cat];

  if (!posts) {
    document.getElementById("postList").innerHTML =
      "<p class='text-danger'>Kategori tidak ditemukan</p>";
    return;
  }

  let html = "";

  posts.forEach(p => {
    html += `
      <div class="d-flex mb-3">

        ${p.image ? `
        <div class="me-2">
          <a href="${p.url}">
            <img src="${p.image}"
                 style="width:120px;height:75px;object-fit:cover;border-radius:6px;">
          </a>
        </div>` : ""}

        <div class="flex-grow-1">
          <a href="${p.url}"
             class="text-dark text-decoration-none fw-semibold d-block">
            ${p.title}
          </a>
        </div>

      </div>
    `;
  });

  document.getElementById("postList").innerHTML = html;
}

// SEARCH KATEGORI
document.getElementById("catSearch").addEventListener("input", function () {
  const q = this.value.toLowerCase();

  let html = "";
  let found = false;

  Object.keys(CAT_DATA).forEach(cat => {
    if (cat.includes(q)) {
      found = true;

      html += `<h5 class="mt-3">${cat}</h5>`;

      CAT_DATA[cat].forEach(p => {
        html += `
          <div class="d-flex mb-3">

            ${p.image ? `
            <div class="me-2">
              <a href="${p.url}">
                <img src="${p.image}"
                     style="width:120px;height:75px;object-fit:cover;border-radius:6px;">
              </a>
            </div>` : ""}

            <div class="flex-grow-1">
              <a href="${p.url}"
                 class="text-dark text-decoration-none fw-semibold d-block">
                ${p.title}
              </a>
            </div>

          </div>
        `;
      });
    }
  });

  document.getElementById("postList").innerHTML =
    found ? html : "<p class='text-danger'>Kategori tidak ditemukan</p>";
});

// AUTO LOAD DARI URL (#inspirasi)
window.addEventListener("load", function () {
  const hash = window.location.hash.replace("#", "").toLowerCase();

  if (hash && CAT_DATA[hash]) {
    showCat(hash);
  }
});
</script>

---
layout: default
title: Kategori
permalink: /categories/
---

<div class="my-5">

  <h6 class="fw-bold text-uppercase mb-3">
    <span class="text-danger">/</span>
    <span id="category-title">KATEGORI</span>
    <span class="text-danger">/</span>
  </h6>

  <div class="row g-4" id="post-list"></div>

  <!-- PAGINATION -->
  <div class="d-flex justify-content-center mt-4 gap-2" id="pagination"></div>

</div>

<script>
const hash = window.location.hash.replace("#", "").toLowerCase();
const params = new URLSearchParams(window.location.search);
let page = parseInt(params.get("page")) || 1;

const perPage = 9;

const allPosts = [
  {% for post in site.posts %}
  {
    title: `{{ post.title | escape }}`,
    url: "{{ post.url | relative_url }}",
    image: "{{ post.image | relative_url }}",
    date: "{{ post.date | date: "%b %-d, %Y" }}",
    excerpt: `{{ post.excerpt | strip_html | truncate: 100 | escape }}`,
    categories: [
      {% for cat in post.categories %}
        "{{ cat | slugify }}"{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ],
    category_name: "{{ post.categories[0] }}"
  },
  {% endfor %}
];

// FILTER CATEGORY
let filtered = hash
  ? allPosts.filter(p => p.categories.includes(hash))
  : allPosts;

// TITLE
document.getElementById("category-title").innerText =
  hash ? hash.toUpperCase() : "SEMUA KATEGORI";

// PAGINATION CALC
const totalPages = Math.ceil(filtered.length / perPage);
if (page < 1) page = 1;
if (page > totalPages) page = totalPages;

// SLICE DATA
const start = (page - 1) * perPage;
const end = start + perPage;
const paginatedPosts = filtered.slice(start, end);

// RENDER POSTS
const container = document.getElementById("post-list");
container.innerHTML = "";

if (paginatedPosts.length === 0) {
  container.innerHTML = `
    <div class="col-12 text-center text-muted py-5">
      Tidak ada postingan.
    </div>
  `;
} else {
  paginatedPosts.forEach(p => {
    container.innerHTML += `
      <div class="col-12 col-md-4">
        <div class="card border-0 h-100">

          <a href="${p.url}" class="text-decoration-none text-dark">

            <div class="position-relative">
              <img src="${p.image ? p.image : '/images/default.jpg'}"
                   class="w-100 rounded"
                   style="aspect-ratio:16/9; object-fit:cover;" loading="lazy">
            </div>

            <div class="mt-3">

              <div class="small text-danger fw-semibold mb-1">
                ${p.category_name}
              </div>

              <h4 class="fw-bold text-dark mb-1">
                ${p.title}
              </h4>

              <small class="text-muted d-block mb-1">
                ${p.date}
              </small>

              <p class="text-muted small mb-0">
                ${p.excerpt}
              </p>

            </div>

          </a>

        </div>
      </div>
    `;
  });
}

// PAGINATION UI
const pagination = document.getElementById("pagination");
pagination.innerHTML = "";

function createPageLink(label, targetPage, disabled = false, active = false) {
  return `
    <a href="?page=${targetPage}#${hash}"
       class="btn btn-sm ${active ? 'btn-danger' : 'btn-outline-danger'} ${disabled ? 'disabled' : ''}">
      ${label}
    </a>
  `;
}

// Prev
if (page > 1) {
  pagination.innerHTML += createPageLink("Prev", page - 1);
}

// Page number
for (let i = 1; i <= totalPages; i++) {
  pagination.innerHTML += createPageLink(i, i, false, i === page);
}

// Next
if (page < totalPages) {
  pagination.innerHTML += createPageLink("Next", page + 1);
}
</script>

<script>
window.addEventListener("hashchange", () => location.reload());
</script>

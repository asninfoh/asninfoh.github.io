---
layout: default
title: Categories
permalink: /categories/
---

<div class="container">

  <h2 class="fw-bold mb-3">
    Kategori Artikel
  </h2>

  <!-- SEARCH KATEGORI -->
  <input id="catSearch"
         class="form-control mb-3"
         placeholder="Cari kategori (contoh: gaji, pns, formasi...)">

  <!-- LIST BUTTON KATEGORI -->
  <div id="catButtons" class="mb-4 d-flex flex-wrap gap-2">

    {% for category in site.categories %}
      <button class="btn btn-sm btn-outline-primary"
              onclick="showCat('{{ category[0] | slugify }}')">
        {{ category[0] }}
      </button>
    {% endfor %}

  </div>

  <hr>

  <!-- OUTPUT POST -->
  <div id="postList">
    <p class="text-muted">Pilih kategori atau ketik di pencarian</p>
  </div>

</div>

<!-- DATA KATEGORI -->
<script>
const CAT_DATA = {
  {% for category in site.categories %}
  "{{ category[0] | slugify }}": [
    {% for post in category[1] %}
    {
      title: "{{ post.title | escape }}",
      url: "{{ post.url }}"
    },
    {% endfor %}
  ],
  {% endfor %}
};

// tampilkan kategori
function showCat(cat) {
  const posts = CAT_DATA[cat] || [];

  let html = `<h4 class="mb-3">Kategori: ${cat}</h4><ul class="list-group">`;

  posts.forEach(p => {
    html += `
      <li class="list-group-item">
        <a href="${p.url}" class="text-decoration-none">
          ${p.title}
        </a>
      </li>
    `;
  });

  html += "</ul>";

  document.getElementById("postList").innerHTML = html;
}

// SEARCH KATEGORI
document.getElementById("catSearch").addEventListener("input", function () {
  const q = this.value.toLowerCase();

  let found = false;
  let html = "";

  Object.keys(CAT_DATA).forEach(cat => {
    if (cat.includes(q)) {
      found = true;

      html += `<h4 class="mt-3">${cat}</h4><ul class="list-group mb-3">`;

      CAT_DATA[cat].forEach(p => {
        html += `
          <li class="list-group-item">
            <a href="${p.url}" class="text-decoration-none">
              ${p.title}
            </a>
          </li>
        `;
      });

      html += "</ul>";
    }
  });

  document.getElementById("postList").innerHTML =
    found ? html : "<p class='text-danger'>Kategori tidak ditemukan</p>";
});

// AUTO LOAD dari sidebar
window.addEventListener("load", function () {
  const hash = window.location.hash.replace("#", "");

  if (hash && CAT_DATA[hash]) {
    showCat(hash);
  }
});
</script>

---
layout: default
title: Kategori
permalink: /categories/
---

<h3 id="category-title" class="mb-4"></h3>

<div id="post-list"></div>

<script>
const hash = window.location.hash.replace("#", "");

const allPosts = [
  {% for post in site.posts %}
  {
    title: "{{ post.title | escape }}",
    url: "{{ post.url | relative_url }}",
    category: "{{ post.categories | first | slugify }}"
  },
  {% endfor %}
];

let filtered = allPosts;

if (hash) {
  filtered = allPosts.filter(p => p.category === hash);
  document.getElementById("category-title").innerText = "Kategori: " + hash;
} else {
  document.getElementById("category-title").innerText = "Semua Kategori";
}

const container = document.getElementById("post-list");

if (filtered.length === 0) {
  container.innerHTML = "<p>Tidak ada postingan.</p>";
} else {
  filtered.forEach(p => {
    container.innerHTML += `
      <div class="mb-2">
        <a href="${p.url}">${p.title}</a>
      </div>
    `;
  });
}
</script>

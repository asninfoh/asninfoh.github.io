---
layout: default
title: Categories
permalink: /categories/
---

<div class="container">

  <h2 class="fw-bold mb-3">Kategori Artikel</h2>

  <!-- BUTTON KATEGORI -->
  <div class="d-flex flex-wrap gap-2 mb-3">

    {% for category in site.categories %}
      <a href="/categories/#{{ category[0] | slugify }}"
         class="btn btn-sm btn-outline-primary">
        {{ category[0] }}
      </a>
    {% endfor %}

  </div>

  <hr>

  <!-- OUTPUT -->
  <div id="postList">

    {% if page.category %}
      {% assign posts = site.categories[page.category] %}
    {% endif %}

    <p class="text-muted">Pilih kategori di atas</p>

  </div>

</div>

<!-- SCRIPT AUTO LOAD -->
<script>
const CAT_DATA = {
  {% for category in site.categories %}
  "{{ category[0] | slugify }}": [
    {% for post in category[1] %}
    {
      title: "{{ post.title | escape }}",
      url: "{{ post.url | relative_url }}",
      image: "{{ post.image | relative_url }}"
    },
    {% endfor %}
  ],
  {% endfor %}
};

function render(cat) {
  const posts = CAT_DATA[cat];

  if (!posts) return;

  let html = "";

  posts.forEach(p => {
    html += `
      <div class="d-flex mb-3">

        ${p.image ? `
        <div class="me-2">
          <a href="${p.url}">
            <img src="${p.image}"
                 style="width:120px;height:75px;object-fit:cover;border-radius:6px;">
          </a>
        </div>` : ""}

        <div class="flex-grow-1">
          <a href="${p.url}"
             class="text-dark text-decoration-none fw-semibold d-block">
            ${p.title}
          </a>
        </div>

      </div>
    `;
  });

  document.getElementById("postList").innerHTML = html;
}

// AUTO LOAD DARI HASH (INI YANG PENTING)
window.addEventListener("load", function () {
  const hash = window.location.hash.replace("#", "").toLowerCase();

  if (hash && CAT_DATA[hash]) {
    render(hash);
  }
});
</script>

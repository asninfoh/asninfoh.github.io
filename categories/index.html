---
layout: default
title: Kategori
permalink: /categories/
---

<div class="my-5">

  <h6 class="fw-bold text-uppercase mb-3">
    <span class="text-danger">/</span>
    <span id="category-title">KATEGORI</span>
    <span class="text-danger">/</span>
  </h6>

  <div class="row g-4" id="post-list"></div>

  <!-- PAGINATION -->
  <div class="d-flex justify-content-center mt-4 gap-2" id="pagination"></div>

</div>

<script>
const perPage = 6;
let currentPage = 1;

const allPosts = JSON.parse(`[
  {% for post in site.posts %}
  {
    "title": {{ post.title | jsonify }},
    "url": {{ post.url | relative_url | jsonify }},
    "image": {{ post.image | relative_url | jsonify }},
    "date": {{ post.date | date: "%b %-d, %Y" | jsonify }},
    "excerpt": {{ post.excerpt | strip_html | truncate: 100 | jsonify }},
    "categories": [
      {% for cat in post.categories %}
        {{ cat | slugify | jsonify }}{% unless forloop.last %},{% endunless %}
      {% endfor %}
    ],
    "category_name": {{ post.categories[0] | jsonify }}
  }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]`);

// ambil hash kategori
function getHash() {
  return window.location.hash.replace("#", "").toLowerCase();
}

let filtered = filterPosts();

function filterPosts() {
  const hash = getHash();
  return hash
    ? allPosts.filter(p => p.categories.includes(hash))
    : allPosts;
}

// title update
function updateTitle() {
  const hash = getHash();
  document.getElementById("category-title").innerText =
    hash ? hash.toUpperCase() : "SEMUA KATEGORI";
}

// render posts
function renderPage(page) {

  const container = document.getElementById("post-list");
  const pagination = document.getElementById("pagination");

  container.innerHTML = "";

  let start = (page - 1) * perPage;
  let end = start + perPage;

  let pageItems = filtered.slice(start, end);

  if (pageItems.length === 0) {
    container.innerHTML = `
      <div class="col-12 text-center text-muted py-5">
        Tidak ada postingan.
      </div>
    `;
    pagination.innerHTML = "";
    return;
  }

  pageItems.forEach(p => {
    container.innerHTML += `
      <div class="col-12 col-md-4">
        <div class="card border-0 h-100">

          <a href="${p.url}" class="text-decoration-none text-dark">

            <div class="position-relative">
              <img src="${p.image || '/images/default.jpg'}"
                   class="w-100 rounded"
                   style="aspect-ratio:16/9; object-fit:cover;" loading="lazy">
            </div>

            <div class="mt-3">

              <div class="small text-danger fw-semibold mb-1">
                ${p.category_name}
              </div>

              <h4 class="fw-bold text-dark mb-1">
                ${p.title}
              </h4>

              <small class="text-muted d-block mb-1">
                ${p.date}
              </small>

              <p class="text-muted small mb-0">
                ${p.excerpt}
              </p>

            </div>

          </a>

        </div>
      </div>
    `;
  });

  renderPagination(page);
}

// pagination
function renderPagination(page) {

  const pagination = document.getElementById("pagination");
  pagination.innerHTML = "";

  let totalPages = Math.ceil(filtered.length / perPage);

  if (totalPages <= 1) return;

  pagination.innerHTML += `
    <button class="btn btn-sm btn-outline-dark"
      ${page === 1 ? "disabled" : ""}
      onclick="goPage(${page - 1})">
      Prev
    </button>

    <span class="small px-2 align-self-center">
      ${page} / ${totalPages}
    </span>

    <button class="btn btn-sm btn-outline-dark"
      ${page === totalPages ? "disabled" : ""}
      onclick="goPage(${page + 1})">
      Next
    </button>
  `;
}

// page change
window.goPage = function(page) {
  currentPage = page;
  renderPage(currentPage);
  window.scrollTo({ top: 0, behavior: "smooth" });
};

// update category tanpa reload
window.addEventListener("hashchange", () => {
  filtered = filterPosts();
  updateTitle();
  currentPage = 1;
  renderPage(currentPage);
  window.scrollTo({ top: 0, behavior: "smooth" });
});

// init
updateTitle();
renderPage(currentPage);
</script>

---
layout: default
title: Kategori
permalink: /categories/
---

<div class="container py-5">

  <h4 class="fw-bold text-uppercase mb-4">
    <span class="text-danger">/</span> 
    SEMUA KATEGORI 
    <span class="text-danger">/</span>
  </h4>

  <div class="row g-3">

    {% for category in site.categories %}
    <div class="col-6 col-md-3">
      <a href="/categories/{{ category[0] | slugify }}/" 
         class="text-decoration-none">

        <div class="p-3 bg-light rounded text-center shadow-sm">

          <h6 class="mb-1 text-dark text-capitalize">
            {{ category[0] }}
          </h6>

          <small class="text-muted">
            {{ category[1].size }} artikel
          </small>

        </div>

      </a>
    </div>
    {% endfor %}

  </div>

</div>
